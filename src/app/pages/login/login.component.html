<div class="min-h-screen bg-[#FAFAFA] flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative">
  <!-- Back Button -->
  <div class="absolute top-6 left-6 sm:top-8 sm:left-8">
    <a routerLink="/" class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors gap-2 cursor-pointer">
      <lucide-icon [img]="ArrowLeftIcon" class="w-4 h-4"></lucide-icon>
      <span>Back</span>
    </a>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center cursor-pointer" routerLink="/">
      <img src="assets/inkwell-logo.svg" alt="inkwell." class="h-8" />
    </div>
    <h2 class="mt-6 text-center text-3xl font-heading font-bold tracking-tight text-gray-900">
      Welcome back
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      New to inkwell?
      <a routerLink="/signup" class="font-medium text-blue-600 hover:text-blue-700 transition-colors">
        Create an account
      </a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 border border-gray-200 rounded-[16px] shadow-sm sm:px-10">
      <!-- Error Message -->
      @if (errorMessage()) {
        <div class="mb-5 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-[12px] text-sm font-medium">
          {{ errorMessage() }}
        </div>
      }

      <!-- Social Sign In -->
      <div class="space-y-3">
        <button
          type="button"
          disabled
          aria-disabled="true"
          title="Coming soon"
          class="w-full inline-flex justify-center items-center py-3 px-4 border border-gray-200 rounded-[12px] bg-gray-50 text-sm font-medium text-gray-400 cursor-not-allowed"
        >
          <svg class="w-5 h-5 mr-2 grayscale opacity-60" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
          </svg>
          <span>Sign in with Google</span>
          <span class="ml-2 text-xs font-semibold text-gray-400">Coming soon</span>
        </button>
        <button
          type="button"
          disabled
          aria-disabled="true"
          title="Coming soon"
          class="w-full inline-flex justify-center items-center py-3 px-4 border border-gray-200 rounded-[12px] bg-gray-50 text-sm font-medium text-gray-400 cursor-not-allowed"
        >
          <svg class="w-5 h-5 mr-2 opacity-50" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          <span>Sign in with GitHub</span>
          <span class="ml-2 text-xs font-semibold text-gray-400">Coming soon</span>
        </button>
      </div>

      <div class="mt-6 relative">
        <div class="absolute inset-0 flex items-center" aria-hidden="true">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="px-2 bg-white text-gray-500 font-medium">Or continue with email</span>
        </div>
      </div>

      <!-- Login Form -->
      <form class="mt-6 space-y-5" (submit)="onSubmit($event)">
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700">Email address</label>
          <div class="mt-1.5 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
              <lucide-icon [img]="MailIcon" class="h-5 w-5"></lucide-icon>
            </div>
            <input
              type="email"
              name="email"
              id="email"
              required
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-[12px] text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-600 focus:border-blue-600 sm:text-sm transition-all"
              placeholder="you@example.com"
            />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
            <div class="text-sm">
              <a href="#" class="font-medium text-blue-600 hover:text-blue-700 transition-colors">
                Forgot password?
              </a>
            </div>
          </div>
          <div class="mt-1.5 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
              <lucide-icon [img]="LockIcon" class="h-5 w-5"></lucide-icon>
            </div>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              name="password"
              id="password"
              required
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              class="block w-full pl-10 pr-10 py-3 border border-gray-200 rounded-[12px] text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-600 focus:border-blue-600 sm:text-sm transition-all"
              placeholder="••••••••"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600"
            >
              <lucide-icon [img]="showPassword() ? EyeOffIcon : EyeIcon" class="h-5 w-5"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="flex items-center">
          <input
            id="remember-me"
            name="remember-me"
            type="checkbox"
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded-[4px]"
          />
          <label for="remember-me" class="ml-2.5 block text-sm text-gray-700 font-medium select-none">
            Remember me
          </label>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="isSubmitting()"
            class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-[12px] shadow-sm text-sm font-bold text-white bg-gray-900 hover:bg-black focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            @if (isSubmitting()) {
              <lucide-icon [img]="Loader2Icon" class="w-4 h-4 mr-2 animate-spin"></lucide-icon>
              <span>Signing in...</span>
            } @else {
              <span>Sign in</span>
              <lucide-icon [img]="ArrowRightIcon" class="w-4 h-4 ml-2"></lucide-icon>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
